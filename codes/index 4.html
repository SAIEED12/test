<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Student Registration Form</h2>

        <form id="myForm">

            <!-- Name -->

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
            <small id="nameError" class="error"></small>


            <!-- Email -->

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com">
            <small id="emailError" class="error"></small>


            <!-- Password -->

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
            <small id="passwordError" class="error"></small>


            <!-- Gender -->

            <label>Gender</label>

            <div class="radio-group">

                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

            </div>

            <small id="genderError" class="error"></small>


            <!-- Department -->

            <label for="department">Department</label>

            <select id="department">
                <option value="">-- Select Department --</option>
                <option value="CSE">CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
            </select>

            <small id="departmentError" class="error"></small>


            <!-- Skills -->

            <label>Skills</label>

            <div class="checkbox-group">

                <input type="checkbox" id="html" name="skill" value="HTML">
                <label for="html">HTML</label>

                <input type="checkbox" id="css" name="skill" value="CSS">
                <label for="css">CSS</label>

                <input type="checkbox" id="js" name="skill" value="JavaScript">
                <label for="js">JavaScript</label>

            </div>

            <small id="skillError" class="error"></small>


            <!-- Address -->

            <label for="address">Address</label>

            <textarea id="address" rows="4"
                placeholder="Enter your address"></textarea>

            <small id="addressError" class="error"></small>


            <!-- Submit -->

            <button type="submit">Submit</button>

        </form>

    </div>

    <script src="script1.js"></script>

</body>

</html>
